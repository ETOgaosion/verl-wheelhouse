name: Build vllm

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "versions.yaml"
      - "ci/generate_matrix.py"
      - "ci/build_scripts/common.sh"
      - "ci/build_scripts/vllm.sh"
      - ".github/workflows/_build.yml"
      - ".github/workflows/build-vllm.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  compute-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - id: matrix
        run: python3 ci/generate_matrix.py --component vllm --github-output

  # A push (including a PR merge) to main publishes too, not just a `v*`
  # tag: wheels land on vllm's own persistent release (tag
  # "vllm-<ref>", see ci/release_meta.py) so they're always pip-installable
  # from the tip of main. `release.yml`'s tag-triggered sweep targets the
  # very same per-component release - this job just keeps it continuously
  # updated between tagged releases too.
  ensure-release:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_ensure_release.yml
    with:
      component: vllm

  build:
    needs: [compute-matrix, ensure-release]
    if: always() && needs.compute-matrix.result == 'success' && (needs.ensure-release.result == 'success' || needs.ensure-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_build.yml
    with:
      component: ${{ matrix.component }}
      path: ${{ matrix.path }}
      ref: ${{ matrix.ref }}
      builder: ${{ matrix.builder }}
      runs-on: ${{ matrix.runs_on }}
      cuda-version: ${{ matrix.cuda }}
      python-version: ${{ matrix.python }}
      torch-version: ${{ matrix.torch }}
      torch-vision-version: ${{ matrix.torch_vision }}
      torch-audio-version: ${{ matrix.torch_audio }}
      cxx11-abi: ${{ matrix.cxx11_abi }}
      torch-cuda-arch-list: ${{ matrix.torch_cuda_arch_list }}
      requires-cudnn: ${{ matrix.requires_cudnn }}
      max-jobs: ${{ matrix.max_jobs }}
      extra-env: ${{ matrix.extra_env }}
      upload-to-release: ${{ github.event_name == 'push' }}
      release-version: ${{ matrix.release_tag }}

  publish-index:
    needs: build
    if: github.event_name == 'push'
    uses: ./.github/workflows/publish-index.yml
    permissions:
      contents: read
      pages: write
      id-token: write
