name: "\u007eBuild wheel"

# Reusable single-combination build workflow, structured after
# flash-attention's own .github/workflows/_build.yml. Every field a build
# needs (component identity, checkout ref, CUDA/Python/Torch versions, arch
# list, job parallelism, extra env) is passed in as an input rather than
# hard-coded, so the whole build matrix is driven purely by the project's
# versions.yaml (in the repo's base directory).

on:
  workflow_call:
    inputs:
      component:
        description: "Component name from versions.yaml (e.g. vllm)"
        required: true
        type: string
      path:
        description: "Submodule path relative to the repo root"
        required: true
        type: string
      ref:
        description: "Git ref (branch/tag/commit) to check out within the submodule"
        required: true
        type: string
      builder:
        description: "Name of ci/build_scripts/<builder>.sh to run"
        required: true
        type: string
      runs-on:
        description: "Runner to build on"
        required: false
        type: string
        default: ubuntu-24.04
      cuda-version:
        required: true
        type: string
      python-version:
        required: true
        type: string
      torch-version:
        required: true
        type: string
      torch-vision-version:
        required: true
        type: string
      torch-audio-version:
        required: true
        type: string
      cxx11-abi:
        required: true
        type: string
      torch-cuda-arch-list:
        required: false
        type: string
        default: ""
      requires-cudnn:
        required: false
        type: string
        default: "false"
      max-jobs:
        required: false
        type: string
        default: "1"
      extra-env:
        description: "JSON object string of extra environment variables to export"
        required: false
        type: string
        default: "{}"
      upload-to-release:
        required: false
        type: boolean
        default: false
      release-version:
        description: "Release tag to upload wheels to, when upload-to-release is true"
        required: false
        type: string
        default: ""

permissions:
  contents: write

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  build:
    name: "${{ inputs.component }} (cuda${{ inputs.cuda-version }}-py${{ inputs.python-version }}-torch${{ inputs.torch-version }})"
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout verl-wheelhouse
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Checkout ${{ inputs.component }} @ ${{ inputs.ref }}
        run: |
          # inputs.path is the build working directory, which is either a
          # submodule root (e.g. "vllm") or a subdirectory within one (e.g.
          # "sglang/sgl-kernel", which lives inside the "sglang" submodule -
          # sgl-kernel isn't a submodule in its own right). `git submodule
          # update -- <pathspec>` only recognizes paths registered in
          # .gitmodules, so walk up from inputs.path to find the nearest
          # registered submodule root.
          submodule_path="${{ inputs.path }}"
          while ! git config -f .gitmodules --get-regexp 'submodule\..*\.path' | awk '{print $2}' | grep -qx "$submodule_path"; do
            if [ "$submodule_path" = "." ]; then
              echo "::error::No submodule in .gitmodules matches or contains path '${{ inputs.path }}'" >&2
              exit 1
            fi
            submodule_path="$(dirname "$submodule_path")"
          done

          # Shallow-init the submodule (fast - uses whatever commit is
          # currently pinned just to get a working .git + origin remote),
          # then fetch and check out the ref versions.yaml actually pins.
          # This decouples version bumps from the submodule pointer commit.
          git submodule update --init --depth 1 -- "$submodule_path"
          cd "$submodule_path"
          git fetch --depth 1 origin "${{ inputs.ref }}"
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive --depth 1

      - name: Free up disk space
        run: |
          source ci/build_scripts/common.sh
          free_disk_space

      - name: Set up swap space
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 10

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install CUDA ${{ inputs.cuda-version }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: ${{ inputs.cuda-version }}
          method: network
          linux-local-args: '["--toolkit"]'
          # nvcc/cudart/nvrtc/nvtx/profiler-api are genuine "cuda-<name>-X-Y" apt
          # packages, so sub-packages (which prepends "cuda-") works for them.
          # nvrtc-dev is separate from nvrtc: the runtime package only ships
          # libnvrtc.so, while nvrtc.h lives in cuda-nvrtc-dev (under
          # targets/x86_64-linux/include). nvtx ships the header-only NVTX v3
          # API (nvtx3/nvToolsExt.h) that TransformerEngine includes from
          # common/nvtx.h. profiler-api ships cuda_profiler_api.h, which apex
          # and TransformerEngine megatron softmax kernels include (even though
          # they don't call the profiler API). cublas, cusolver, cusparse,
          # curand and cufft are NOT: NVIDIA has only ever published these as
          # "lib<name>-X-Y" / "lib<name>-dev-X-Y" - there is no "cuda-cublas-X-Y"
          # etc. on any CUDA version - so they must go through
          # non-cuda-sub-packages (no prefix added) instead, with both the
          # runtime and -dev (headers) package requested.
          # cccl ships cuda/atomic, cuda/std/*, thrust, cub headers. CUDA 13
          # moved them under include/cccl/; host C++ builds need the cccl
          # include root on the search path (see ensure_cuda_cccl_include_path).
          sub-packages: '["nvcc", "cudart", "nvrtc", "nvrtc-dev", "nvtx", "profiler-api", "cccl"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev", "libcusolver", "libcusolver-dev", "libcusparse", "libcusparse-dev", "libcurand", "libcurand-dev", "libcufft", "libcufft-dev"]'

      - name: Install cuDNN
        if: inputs.requires-cudnn == 'true'
        env:
          CUDA_VERSION: ${{ inputs.cuda-version }}
        run: |
          source ci/build_scripts/common.sh
          install_cudnn

      - name: Install PyTorch ${{ inputs.torch-version }}+cu${{ inputs.cuda-version }}
        run: |
          pip install --upgrade pip
          TORCH_CUDA_TAG="cu$(echo '${{ inputs.cuda-version }}' | cut -d. -f1,2 | tr -d '.')"
          pip install \
            "torch==${{ inputs.torch-version }}" \
            "torchvision==${{ inputs.torch-vision-version }}" \
            "torchaudio==${{ inputs.torch-audio-version }}" \
            --index-url "https://download.pytorch.org/whl/${TORCH_CUDA_TAG}"
          python -c "import torch; print('torch', torch.__version__, 'cuda', torch.version.cuda)"

      - name: Restore resumable build cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.path }}/build-cache.tar
          key: never-match-${{ github.run_id }}
          restore-keys: |
            build-cache-${{ inputs.component }}-${{ inputs.cuda-version }}-${{ inputs.python-version }}-${{ inputs.torch-version }}-

      - name: Unpack resumable build cache
        working-directory: ${{ inputs.path }}
        run: |
          if [ -f build-cache.tar ]; then
            echo "Resuming from a previous (timed-out) build attempt"
            tar -xpf build-cache.tar
            rm -f build-cache.tar
          fi

      - name: Build wheel
        id: build_wheel
        working-directory: ${{ inputs.path }}
        env:
          COMPONENT: ${{ inputs.component }}
          CUDA_VERSION: ${{ inputs.cuda-version }}
          PYTHON_VERSION: ${{ inputs.python-version }}
          TORCH_VERSION: ${{ inputs.torch-version }}
          TORCH_VISION_VERSION: ${{ inputs.torch-vision-version }}
          TORCH_AUDIO_VERSION: ${{ inputs.torch-audio-version }}
          CXX11_ABI: ${{ inputs.cxx11-abi }}
          TORCH_CUDA_ARCH_LIST: ${{ inputs.torch-cuda-arch-list }}
          MAX_JOBS: ${{ inputs.max-jobs }}
          EXTRA_ENV: ${{ inputs.extra-env }}
        run: |
          set +e
          # GitHub Actions jobs are capped at 6h; stop safely with time to
          # spare so the "save build cache" step below can still run and a
          # re-run of this workflow can resume instead of starting cold.
          timeout 5h bash "${GITHUB_WORKSPACE}/ci/build_scripts/${{ inputs.builder }}.sh"
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Save resumable build cache (on timeout)
        if: always() && steps.build_wheel.outputs.exit_code == '124'
        working-directory: ${{ inputs.path }}
        run: tar -cpf build-cache.tar --exclude=build-cache.tar .

      - name: Upload resumable build cache (on timeout)
        if: always() && steps.build_wheel.outputs.exit_code == '124'
        uses: actions/cache/save@v4
        with:
          path: ${{ inputs.path }}/build-cache.tar
          key: build-cache-${{ inputs.component }}-${{ inputs.cuda-version }}-${{ inputs.python-version }}-${{ inputs.torch-version }}-${{ github.run_id }}

      - name: Fail if build did not finish in time
        if: steps.build_wheel.outputs.exit_code == '124'
        run: |
          echo "::error::${{ inputs.component }} did not finish within the 5h budget. A resumable build cache was saved - re-run this workflow to continue from where it left off."
          exit 1

      - name: Fail on build error
        if: steps.build_wheel.outputs.exit_code != '0' && steps.build_wheel.outputs.exit_code != '124'
        run: exit ${{ steps.build_wheel.outputs.exit_code }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ inputs.component }}-cu${{ inputs.cuda-version }}-py${{ inputs.python-version }}-torch${{ inputs.torch-version }}
          path: ${{ inputs.path }}/dist/*.whl
          if-no-files-found: error

      - name: Ensure release ${{ inputs.release-version }}
        if: inputs.upload-to-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install pyyaml
          python3 ci/release_meta.py --component "${{ inputs.component }}" > release-meta.json
          TAG=$(python3 -c "import json; print(json.load(open('release-meta.json'))[0]['tag'])")
          TITLE=$(python3 -c "import json; print(json.load(open('release-meta.json'))[0]['title'])")
          NOTES=$(python3 -c "import json; print(json.load(open('release-meta.json'))[0]['notes'])")
          if [ "$TAG" != "${{ inputs.release-version }}" ]; then
            echo "::error::release_meta tag ($TAG) does not match release-version (${{ inputs.release-version }})" >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$TITLE"
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TITLE" \
              --notes "$NOTES"
          fi

      - name: Upload wheel(s) to release ${{ inputs.release-version }}
        if: inputs.upload-to-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.release-version }}" ${{ inputs.path }}/dist/*.whl \
            --repo "${{ github.repository }}" --clobber
