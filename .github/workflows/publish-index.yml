name: Publish package index

# (Re)builds the static PEP 503 "simple" index from every .whl currently
# attached to any GitHub Release, and deploys it to GitHub Pages. Chained
# from release.yml / build-<component>.yml only after a successful build;
# can also be run standalone via workflow_dispatch to refresh the index
# without rebuilding any wheels.

on:
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate PEP 503 index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/build_index.py --repo "${{ github.repository }}" --out-dir _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-index
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
