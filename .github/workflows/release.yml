name: Release wheels

# On a `v*` tag push (or manual dispatch): run a full-matrix rebuild across
# every component, ensuring/updating each component's own persistent GitHub
# Release (tag "<component>-<ref>", see ci/release_meta.py) and uploading
# its wheel(s) there. The pushed tag itself is just the trigger - it is not
# a release on its own; see build-<component>.yml for the same per-component
# release model applied to every push to main. Finishes by (re)publishing
# the GitHub Pages PEP 503 index so the new wheels become pip-installable.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  compute-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - id: matrix
        run: python3 ci/generate_matrix.py --component all --github-output

  ensure-releases:
    uses: ./.github/workflows/_ensure_release.yml
    with:
      component: all

  build:
    needs: [compute-matrix, ensure-releases]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_build.yml
    with:
      component: ${{ matrix.component }}
      path: ${{ matrix.path }}
      ref: ${{ matrix.ref }}
      builder: ${{ matrix.builder }}
      runs-on: ${{ matrix.runs_on }}
      cuda-version: ${{ matrix.cuda }}
      python-version: ${{ matrix.python }}
      torch-version: ${{ matrix.torch }}
      torch-vision-version: ${{ matrix.torch_vision }}
      torch-audio-version: ${{ matrix.torch_audio }}
      cxx11-abi: ${{ matrix.cxx11_abi }}
      torch-cuda-arch-list: ${{ matrix.torch_cuda_arch_list }}
      requires-cudnn: ${{ matrix.requires_cudnn }}
      max-jobs: ${{ matrix.max_jobs }}
      extra-env: ${{ matrix.extra_env }}
      upload-to-release: true
      release-version: ${{ matrix.release_tag }}

  publish-index:
    needs: build
    uses: ./.github/workflows/publish-index.yml
    permissions:
      contents: read
      pages: write
      id-token: write
