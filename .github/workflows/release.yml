name: Release wheels

# On a `v*` tag push: create (or reuse) the matching GitHub release, then
# build every component x every versions.yaml build_matrix combination and
# upload each wheel as a release asset. Finishes by (re)publishing the
# GitHub Pages PEP 503 index so the new wheels become pip-installable.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and release wheels for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  setup-release:
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (if it doesn't already exist)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, reusing it."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              --notes "Prebuilt CUDA wheels for apex, TransformerEngine, flash-attention, flashinfer, sgl-kernel, and vllm. See versions.yaml in this tag for exact pinned versions."
          fi

  compute-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - id: matrix
        run: python3 ci/generate_matrix.py --component all --github-output

  build:
    needs: [setup-release, compute-matrix]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_build.yml
    with:
      component: ${{ matrix.component }}
      path: ${{ matrix.path }}
      ref: ${{ matrix.ref }}
      builder: ${{ matrix.builder }}
      runs-on: ${{ matrix.runs_on }}
      cuda-version: ${{ matrix.cuda }}
      python-version: ${{ matrix.python }}
      torch-version: ${{ matrix.torch }}
      torch-vision-version: ${{ matrix.torch_vision }}
      torch-audio-version: ${{ matrix.torch_audio }}
      cxx11-abi: ${{ matrix.cxx11_abi }}
      torch-cuda-arch-list: ${{ matrix.torch_cuda_arch_list }}
      requires-cudnn: ${{ matrix.requires_cudnn }}
      max-jobs: ${{ matrix.max_jobs }}
      extra-env: ${{ matrix.extra_env }}
      upload-to-release: true
      release-version: ${{ needs.setup-release.outputs.release-version }}

  publish-index:
    needs: build
    uses: ./.github/workflows/publish-index.yml
    permissions:
      contents: read
      pages: write
      id-token: write
